<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Signup Page</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:radial-gradient(circle at top right,#ff6a00,#420000 55%,#120000);color:#fff}
.card{width:380px;max-width:92%;padding:35px 28px;border:2px solid rgba(255,255,255,.5);border-radius:28px;background:rgba(20,0,0,.55);backdrop-filter:blur(10px);box-shadow:0 0 25px rgba(255,80,0,.35)}
.logo{text-align:center;font-size:34px;margin-bottom:14px}
h1{text-align:center;color:#ffb000;font-size:42px;text-shadow:0 0 15px rgba(255,140,0,.8)}
p.sub{text-align:center;color:#c9a38e;margin:8px 0 28px}
.input{margin:14px 0}
.input input{width:100%;padding:16px 18px;border-radius:18px;border:1px solid rgba(255,120,0,.4);background:rgba(255,255,255,.06);color:#fff;font-size:18px;outline:none}
.row{display:flex;justify-content:space-between;align-items:center;margin:14px 0;color:#eee;font-size:15px}
.row a,.footer a{color:#ffb000;text-decoration:none;font-weight:700}
button{width:100%;margin-top:18px;padding:16px;border:none;border-radius:18px;font-size:24px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(90deg,#c40000,#ff8a00);box-shadow:0 0 25px rgba(255,80,0,.7)}
.footer{text-align:center;margin-top:26px;color:#c9a38e}
</style>
</head>
<body>
<div class="card">
<div class="logo">👻</div>
<h1>Sign Up</h1>
<p class="sub">Create account to start earning</p>
<div class="input"><input type="text" placeholder="Full Name"></div>
<div class="input"><input type="email" placeholder="Email"></div>
<div class="input"><input type="password" placeholder="Password"></div>
<div class="row"><label><input type="checkbox"> Remember me</label><a href="#">Forgot Password?</a></div>
<button>Create Account</button>
<p class="footer">Already have an account? <a href="#">Login now!</a></p>
</div>
</body>
</html>
